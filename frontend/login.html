<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QUEUEFREE - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@300;400;600&family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <header>
      <h1>QUEUEFREE Employee Data Management</h1>
    </header>
    <main>
      <div class="container login-container">
        <h2>Sign In</h2>
        <p>Please sign in with your Google account to continue.</p>
        <div
          id="g_id_onload"
          data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
          data-callback="handleCredentialResponse"
        ></div>
        <div
          class="g_id_signin"
          data-type="standard"
          data-size="large"
          data-theme="outline"
          data-text="sign_in_with"
          data-shape="rectangular"
          data-logo_alignment="left"
        ></div>
      </div>
    </main>
    <footer>
      <p>&copy; 2024 QUEUEFREE</p>
    </footer>
    <script src="js/auth.js"></script>
  </body>
</html>
