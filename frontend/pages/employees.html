<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employees - QUEUEFREE</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <div class="container dashboard-container">
      <aside class="sidebar">
        <div class="logo">
          <h2>QUEUEFREE</h2>
        </div>

        <nav class="side-nav">
          <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="employees.html" class="active">Employees</a></li>
            <li><a href="departments.html">Departments</a></li>
            <li><a href="attendance.html">Attendance</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li><a href="settings.html">Settings</a></li>
          </ul>
        </nav>

        <div class="user-info">
          <img src="../assets/img/avatar.png" alt="User Avatar" />
          <div>
            <p class="user-name">John Doe</p>
            <p class="user-role">Administrator</p>
            <a href="#" id="logoutBtn">Logout</a>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <header class="dashboard-header">
          <h1>Employees</h1>
          <div class="actions">
            <input
              type="text"
              id="employeeSearch"
              placeholder="Search employees..."
            />
            <button class="btn primary-btn" id="addEmployeeBtn">
              Add Employee
            </button>
          </div>
        </header>

        <section class="filter-options">
          <div class="filter-group">
            <label for="departmentFilter">Department:</label>
            <select id="departmentFilter">
              <option value="">All Departments</option>
              <option value="IT">IT</option>
              <option value="HR">HR</option>
              <option value="Finance">Finance</option>
              <option value="Marketing">Marketing</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="statusFilter">Status:</label>
            <select id="statusFilter">
              <option value="">All Status</option>
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
              <option value="onLeave">On Leave</option>
            </select>
          </div>
        </section>

        <section class="employee-list">
          <div class="table-container">
            <table id="employeesTable">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Department</th>
                  <th>Position</th>
                  <th>Joining Date</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <!-- Data will be populated via JavaScript -->
              </tbody>
            </table>
          </div>

          <div class="pagination">
            <button id="prevPage">Previous</button>
            <div id="pageNumbers"></div>
            <button id="nextPage">Next</button>
          </div>
        </section>
      </main>
    </div>

    <!-- Employee Modal -->
    <div id="employeeModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="modalTitle">Add Employee</h2>
        <form id="employeeForm">
          <input type="hidden" id="employeeId" />
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input type="text" id="firstName" name="firstName" required />
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName" name="lastName" required />
            </div>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="department">Department</label>
              <select id="department" name="department" required>
                <option value="">Select Department</option>
                <option value="IT">IT</option>
                <option value="HR">HR</option>
                <option value="Finance">Finance</option>
                <option value="Marketing">Marketing</option>
              </select>
            </div>
            <div class="form-group">
              <label for="position">Position</label>
              <input type="text" id="position" name="position" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="joiningDate">Joining Date</label>
              <input type="date" id="joiningDate" name="joiningDate" required />
            </div>
            <div class="form-group">
              <label for="status">Status</label>
              <select id="status" name="status" required>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
                <option value="onLeave">On Leave</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn secondary-btn" id="cancelBtn">
              Cancel
            </button>
            <button type="submit" class="btn primary-btn">Save</button>
          </div>
        </form>
      </div>
    </div>

    <script src="../assets/js/employees.js"></script>
    <script src="../assets/js/api.js"></script>
  </body>
</html>
