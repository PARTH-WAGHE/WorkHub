# Use PORT from environment (Render/Cloud), default 8080
server.port=${PORT:8080}

# Prefer full URL via SPRING_DATASOURCE_URL (e.g., jdbc:postgresql://...), else build MySQL URL from parts
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:${MYSQL_HOST:localhost}}:${DB_PORT:${MYSQL_PORT:3306}}/${DB_NAME:${MYSQL_DB:queuefree_db}}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}

# Credentials (MySQL defaults; override as needed)
spring.datasource.username=${DB_USER:${MYSQL_USER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQL_PASSWORD:}}

# Optional explicit driver (auto-detected if not set)
spring.datasource.driver-class-name=${DB_DRIVER:}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Default to MySQL; override with org.hibernate.dialect.PostgreSQLDialect for Postgres
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
