# Use PORT from environment (Render/Cloud), default 8080
server.port=${PORT:8080}

# Prefer full URL via SPRING_DATASOURCE_URL, else build PostgreSQL URL from parts
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:${POSTGRES_HOST:localhost}}:${DB_PORT:${POSTGRES_PORT:5432}}/${DB_NAME:${POSTGRES_DB:workhub_db}}?sslmode=${DB_SSL_MODE:disable}}

# Credentials (override as needed)
spring.datasource.username=${DB_USER:${POSTGRES_USER:postgres}}
spring.datasource.password=${DB_PASSWORD:${POSTGRES_PASSWORD:}}

# Optional explicit driver (auto-detected if not set)
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

# Run schema SQL automatically at startup (supports backend and repo-root working dirs)
spring.sql.init.mode=always
spring.sql.init.schema-locations=optional:file:../database/provision-workhub-user.sql,optional:file:database/provision-workhub-user.sql

# HikariCP - tune for low connection limits (e.g., AlwaysData free)
spring.datasource.hikari.pool-name=WorkHubHikari
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:1}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:0}
# 30 seconds
spring.datasource.hikari.idle-timeout=30000
# 60 seconds
spring.datasource.hikari.max-lifetime=60000
# 20 seconds
spring.datasource.hikari.connection-timeout=20000
# disabled
spring.datasource.hikari.keepalive-time=0
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=20000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.initialization-fail-timeout=0

# JTA warning: Safe to ignore (no JTA platform configured)
