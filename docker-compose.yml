version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: workhub-backend
    ports:
      - "8080:8080"
    environment:
      # Use either full URL or parts. Replace with your real PostgreSQL values.
      # SPRING_DATASOURCE_URL: "jdbc:postgresql://<HOST>:5432/<DB>?sslmode=require"
      DB_HOST: "<HOST>"
      DB_PORT: "5432"
      DB_NAME: "<DB>"
      DB_USER: "<USER>"
      DB_PASSWORD: "<PASSWORD>"
      HIBERNATE_DIALECT: "org.hibernate.dialect.PostgreSQLDialect"
      # Google OAuth (authorization code flow)
      WORKHUB_GOOGLE_CLIENT_ID: "<GOOGLE_CLIENT_ID>"
      WORKHUB_GOOGLE_CLIENT_SECRET: "<GOOGLE_CLIENT_SECRET>"
      WORKHUB_GOOGLE_REDIRECT_URI: "http://localhost:8080/api/auth/google/callback"
      WORKHUB_FRONTEND_URL: "http://localhost:5173"

  frontend:
    build:
      context: ./frontend
    container_name: workhub-frontend
    ports:
      - "5173:80"
    environment:
      # If your frontend builds with API base at runtime, keep this for clarity.
      # For static builds, set VITE_API_BASE_URL at build time instead.
      VITE_API_BASE_URL: "http://localhost:8080"
    depends_on:
      - backend
