version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: queuefree-backend
    ports:
      - "8080:8080"
    environment:
      # Use either full URL or parts. Replace with your real values (e.g., AlwaysData/PlanetScale).
      # SPRING_DATASOURCE_URL: "jdbc:mysql://<HOST>:3306/<DB>?useSSL=true"
      DB_HOST: "<HOST>"
      DB_PORT: "3306"
      DB_NAME: "<DB>"
      DB_USER: "<USER>"
      DB_PASSWORD: "<PASSWORD>"
      HIBERNATE_DIALECT: "org.hibernate.dialect.MySQLDialect"

  frontend:
    build:
      context: ./frontend
    container_name: queuefree-frontend
    ports:
      - "5173:80"
    environment:
      # If your frontend builds with API base at runtime, keep this for clarity.
      # For static builds, set VITE_API_BASE_URL at build time instead.
      VITE_API_BASE_URL: "http://localhost:8080"
    depends_on:
      - backend
